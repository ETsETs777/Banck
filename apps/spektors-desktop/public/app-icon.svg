<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Spektors Launcher">
  <defs>
    <linearGradient id="spektors-face" x1="16%" y1="10%" x2="84%" y2="90%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="40%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="spektors-bg" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#151c28"/>
      <stop offset="100%" stop-color="#06080d"/>
    </linearGradient>
    <linearGradient id="spektors-rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.48"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.22"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" ry="108" fill="url(#spektors-bg)"/>
  <rect
    x="20"
    y="20"
    width="472"
    height="472"
    rx="92"
    ry="92"
    fill="none"
    stroke="url(#spektors-rim)"
    stroke-width="6"
  />
  <!-- Монограмма S: читается от 16×16 до 512×512 -->
  <path
    fill="none"
    stroke="url(#spektors-face)"
    stroke-width="54"
    stroke-linecap="round"
    stroke-linejoin="round"
    d="M 348 118
       C 168 118 88 198 88 268
       C 88 332 152 378 264 398
       C 376 418 424 458 424 520
       C 424 588 320 612 112 520"
  />
</svg>
